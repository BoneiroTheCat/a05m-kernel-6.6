name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Toolchain
        run: |
          pip install gdown
          cd kernel
          gdown "https://drive.google.com/file/d/1vsQfRgdNHlD0md9tF7j5fpkL_17whzbH/view?usp=sharing" -O toolchain.tar.gz
          tar -xf toolchain.tar.gz
          unlink toolchain.tar.gz
          cd ..
      - name: Build Kernel
        run: bash build_kernel.sh
      - name: Upload File to Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "../a05m-6.6-kernel.zip"  # Path to the file you want to attach as a package
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
