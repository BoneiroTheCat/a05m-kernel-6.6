name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Packages
        run: sudo apt-get update && sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig
      - name: Install Toolchain
        run: |
          pip install gdown
          cd kernel
          gdown "https://drive.google.com/file/d/1vsQfRgdNHlD0md9tF7j5fpkL_17whzbH/view?usp=sharing" -O toolchain.tar.gz
          tar -xvf toolchain.tar.gz
          unlink toolchain.tar.gz
          cd ..
      - name: Build Kernel
        run: |
          file kernel/prebuilts/kernel-build-tools/bazel/linux-x86_64/bazel
          ldd kernel/prebuilts/kernel-build-tools/bazel/linux-x86_64/bazel
          bash build_kernel.sh
      - name: Upload File to Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "../a05m-6.6-kernel.zip"  # Path to the file you want to attach as a package
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
